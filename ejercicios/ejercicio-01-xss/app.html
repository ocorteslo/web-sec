<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 1 - XSS</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .message-form {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #1976d2;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .messages {
            margin-top: 20px;
        }
        .message {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .warning {
            background: #fff3cd;
            padding: 15px;
            border-left: 4px solid #ffc107;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="warning">
        <strong>⚠️ EJERCICIO:</strong> Este código tiene vulnerabilidades XSS. Tu tarea es corregirlas.
    </div>

    <h1>Aplicación de Mensajes</h1>
    
    <div class="message-form">
        <h2>Enviar Mensaje</h2>
        <input type="text" id="messageInput" placeholder="Escribe tu mensaje...">
        <button onclick="addMessage()">Enviar</button>
    </div>

    <div class="messages">
        <h2>Mensajes:</h2>
        <div id="messagesList"></div>
    </div>

    <script>
        // TODO: Corregir este código para prevenir XSS
        
        function addMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value;
            
            if (message.trim() === '') {
                alert('Por favor ingresa un mensaje');
                return;
            }

            // VULNERABLE: Usar innerHTML directamente
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            messageDiv.innerHTML = '<strong>Usuario:</strong> ' + message;
            
            document.getElementById('messagesList').appendChild(messageDiv);
            input.value = '';
        }

        // Permitir enviar con Enter
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addMessage();
            }
        });
    </script>
</body>
</html>
